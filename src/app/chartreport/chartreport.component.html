
<div class="trail" id="trail">
  <!-- <app-sidetest></app-sidetest> -->
  <div class="main-content" style="background-color: #FDFBFE;    width: 100%; height: 100vh;">
    <app-sidetest  *ngIf="this.role==0"  [ngClass]="{'isOpen1': isOpen1}"></app-sidetest>
    <app-sidenavbar  *ngIf="this.role==1"  [ngClass]="{'isOpen1': isOpen1}"></app-sidenavbar>
    <div class="top">
      <h1 class="heading">Chart Report</h1>
      <div class="rightop">

        <div>
          <button class="billbut" (click)="toggleDropdown()"><img src="assets/images/fi_1159922.png" alt="">&nbsp;Create Bill</button>
          <div class="dropdown-content" [ngClass]="{ 'show': isDropdownOpen }">
            <div (click)="servebill()" class="repnav"> Service </div><br>
            <div (click)="probill()" class="repnav"> Product </div><br>

          </div>
        </div>

<div>
        <!-- <i class="fa fa-bell"  aria-hidden="true"></i> -->
        <div class="profile" (click)="toggleDropdown1()">
         <div class="propic">
           <img src="assets/images/Profile icon.png" alt="">

         </div>
         <h1 class="proname">{{this.profilerole}}</h1>
         <i class="fa fa-caret-down" aria-hidden="true" style="margin-top: 10px;color: #5041BC;"></i>
        </div>
        <div class="dropdown-content1" [ngClass]="{ 'show': isDropdownOpen1 }">
          <div  class="repnav side" (click)="editprofile()"> Edit Profile</div><br>
          <div class="repnav side" (click)="logout()"> Log out </div><br>
        </div>
        </div>
           </div>

      </div>
   <div class="dashboard">

  <!-- Top Services -->
  <div class="chart-card">
    <h3>Top 10 Services</h3>
    <canvas id="serviceChart"></canvas>
  </div>

  <!-- Top Products -->
  <div class="chart-card">
    <h3>Top 10 Products</h3>
    <canvas id="productChart"></canvas>
  </div>

  <!-- Gender Pie -->
  <div class="chart-card">
    <h3>Sales by Gender</h3>
    <canvas id="genderChart"></canvas>
  </div>

</div>
  </div>
