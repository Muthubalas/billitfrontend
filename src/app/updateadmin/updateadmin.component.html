<div class="form">
  <form action="" [formGroup]="admin">
  <div class="row1">
    <div style="display: none;"><label for="" class="mb-2">User Name</label><span  style="color:red;">*</span> <br> <input type="text" formControlName="name"   class="adminpt"></div>
    <div id="name"><label for="" class="mb-2">User Name</label><span  style="color:red;">*</span> <br> <input type="text" formControlName="name"  (input)="clearUsernameError()" style="text-transform: capitalize;" class="adminpt">
    <br>      <span style="color: red;" *ngIf="usernameExists">Username already exists</span></div>
    <div><label for="" class="mb-2">Email ID</label> <span  style="color:red;">*</span><br><input type="email" formControlName="email"  name="" id="" class="adminpt"></div>
  </div>
  <div class="row2">
  <div><label for="" class="mb-2">Password</label><span  style="color:red;">*</span> <br>
    <input [type]="changetype?'password':'text'" class="adminpt" value=" " formControlName="password"><span class="eye" (click)="view()"><i [ngClass]="visible?'fa fa-eye-slash':'fa fa-eye'" style="cursor: pointer;"></i></span>
  </div>
   <div><label for="" class="mb-2">Phone No</label> <span  style="color:red;">*</span><br><input type="tel" name="" pattern="[0-9]{10}" maxlength="10" id="" class="adminpt" formControlName="phone" > <br>
     <span  style="color:red;" *ngIf="phone && phone.invalid && phone.touched">*Phone no  is required</span></div>
<!-- </div> -->
  </div>
  <div class="row3">
    <div><label for="" class="mb-2">Role</label> <span  style="color:red;">*</span><br>
      <select name="" id=""formControlName="role"  name="" id="" class="adminpt">
        <option value="Admin">Admin</option>
        <option value="Manager">Manager</option>
      </select>

     </div>
  <div class="formbut">
    <div> <button class="custosave" (click)="updateadmin()">Update</button>
    </div>
    <div>  <button class="custocancel" (click)="cancelUpdate()">Cancel</button>
    </div>
    </div>
    </div>
    </form>
</div>
