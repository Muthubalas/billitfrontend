
<div mat-dialog-content>
  <div class="popup">
    <form [formGroup]="service">
      <div class="idimg">
        <div class="proid">
          <img src="assets/images/Vector.png" style="width:20.48px;height:15.02px;position: relative;top:15px;left: 32px;" alt="">
          <input type="text" formControlName="id" class="id" id="productid" readonly>
        </div>
        <img src="assets/images/fi_781720.png" alt=""  class="serviceimg">
      </div>
      <div class="idet">
        <div class="f1">
          <label for="">Service Name</label><span  style="color:red;">*</span><br>
          <input type="text" formControlName="_id" class="inp1" style="display: none;">
          <input type="text" formControlName="name" style="text-transform: capitalize;" class="inp1">
        </div>
        <div>
          <label for="">Gender</label><span  style="color:red;">*</span><br>
          <select name="" id=""  (change)="select($event)"  formControlName="gender" class="inp1">
            <option value="Male">Male</option>
            <option value="Female">Female</option>

          </select>
        </div>
      </div>
      <div class="idet1">
        <div class="f1">
        <label for="">Description</label><br>
        <input type="text" formControlName="description" style="text-transform: capitalize;" class="inp1">

        </div>
        <div>
          <label for="">Cost</label><span  style="color:red;">*</span><br>
          <input type="number" formControlName="price" class="inp1"><br>


        </div>

        </div>


      <div class="buttons">
      <div> <button class="save" type="button" (click)="updateService()">Update</button></div>
       <div> <button class="cancel" type="button" mat-dialog-close (click)="cancelUpdate()">Cancel</button></div>
      </div>

    </form>
  </div>
</div>
