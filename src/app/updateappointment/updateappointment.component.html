
<div mat-dialog-content>
    <div class="popup">
      <form [formGroup]="appointment">
    
        <div class="idet">
          <div class="f1">
            <label for="">Customer Name</label><span  style="color:red;">*</span><br>
            <input type="text" formControlName="customer_name" style="text-transform: capitalize;" class="inp1">
          </div>
          <div>
            <label for="">Gender</label><span  style="color:red;">*</span><br>
            <select name="" id=""  (change)="select($event)"  formControlName="gender" class="inp1">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
  
            </select>
          </div>
        </div>
        <div class="idet1">
          <div class="f1">
          <label for="">Service</label><br>
          <input type="text" formControlName="service" style="text-transform: capitalize;" class="inp1">
  
          </div>
          <div>
            <label for="">Phone</label><span  style="color:red;">*</span><br>
            <input type="number" formControlName="phone" class="inp1"><br>
  
  
          </div>
  
          </div>
          <div class="idet1">
            <div class="f1">
            <label for="">Date and Time</label><br>
            <input type="text" formControlName="date_time" style="text-transform: capitalize;" class="inp1">
    
            </div>
            <div>
              <label for="">Location</label><span  style="color:red;">*</span><br>
              <input type="text" formControlName="location" class="inp1"><br>
    
    
            </div>
    
            </div>
            <div class="idet1">
              <div class="f1">
              <label for="">Staff name</label><br>
              <input type="text" formControlName="staffname" style="text-transform: capitalize;" class="inp1">
      
              </div>
              <div>
                <label for="">Status</label><span  style="color:red;">*</span><br>
                <select name="" id=""  (change)="select($event)"  formControlName="status" class="inp1">
                  <option value="Pending">Pending</option>
                  <option value="Inprogress">Inprogress</option>
                  <option value="Completed">Completed</option>
                </select><br>
      
      
              </div>
      
              </div>
  
        <div class="buttons">
        <div> <button class="save" type="button" (click)="updateappointment()">Update</button></div>
         <div> <button class="cancel" type="button" mat-dialog-close (click)="cancelUpdate()">Cancel</button></div>
        </div>
  
      </form>
    </div>
  </div>
