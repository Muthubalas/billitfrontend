<div class="ss">
  <h1 class="heading">All Product</h1>
  <div class="rightbot">
    <div class="rights">
  <div class="search1">
    <input type="text" name=""  [(ngModel)]="searchTerm" (ngModelChange)="onFilterChange()" class="topsearch" id=""> <img src="assets/images/search icon.png" style="position: relative;right: 40px;top: -2px;" alt="">
  </div>
  <button class="add" style="background-color:#0D99FF;border: none;color: white;" (click)="addproduct()" ><div style="margin-top: 2px;">
    <!-- <img src="assets/images/zondicons_add-outline.png" alt=""> -->
    <i class="fa fa-plus" aria-hidden="true" style="margin-top: 4px;"></i>
  </div><div style="margin-top: 3px;">Add Product</div></button>
  <!-- <div><button class="add"  (click)="addproduct()"><div style="margin-top: 2px;"><img src="assets/images/zondicons_add-outline.png" alt=""></div><div style="margin-top: 3px;">Add Product</div></button></div> -->

  </div>
  </div>

</div>
<div class="custotable mb-3 mt-3">
  <table class="tabler ">

    <thead class="" style="background-color: #DEEDFA; height: 50px;position: sticky;top: 0;" >
    <tr>
      <th>SN</th>
      <th>Product ID</th>
      <th>Product name</th>
      <th>Category</th>
      <th>Quantity</th>
      <th>Cost</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody class="t1"  style="background-color: white;font-weight: normal; ">
    <tr *ngFor="let item of filteredPeople1 ; let i=index">
      <td class="t3">{{ calculateIndex(i) }}</td>
      <td class="t3">{{item.Product_id}}</td>
      <td class="t3">{{item.Product_name}}</td>
      <td class="t3">{{item.Product_category}}</td>
      <td class="t3">{{item.Product_quantity}} </td>
      <td class="t3">{{item.Product_price}}</td>
      <!-- <td class="t4"><img src="assets/images/Group 22173.png" (click)="proupdate(item)" alt=""></td>
      <td class="t4"><img src="assets/images/trash-2.png" (click)="deletepro(item)" alt=""></td> -->
      <td class="t4"><div class="actions"><div><button class="edit"  [disabled]="profilerole !== '0'"
        [ngClass]="{'disabled-btn': profilerole !== '0'}" (click)="proupdate(item)"><img src="assets/images/Group 22440.png" alt=""> Edit</button></div>
        <div><button class="delete" [disabled]="profilerole !== '0'"
        [ngClass]="{'disabled-btn': profilerole !== '0'}" (click)="deletepro(item)"><img src="assets/images/mdi_delete.png" alt=""> Delete</button></div></div></td>
    </tr>


  </tbody>
   </table>
</div>
